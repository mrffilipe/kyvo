# Admin SPA — Vite dev server in Docker.
#
#   cp .env.example .env
#   docker compose up
#
# Ensure the API is reachable at VITE_API_BASE_URL (default http://localhost:5000).
# When the API runs in backend/docker-compose, start that stack first.

services:
  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 3000"
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
