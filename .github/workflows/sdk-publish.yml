# Maintainer workflow: build, test, and publish Kyvo product SDKs to NuGet and npm.
#
# Packages:
#   npm  — @kyvo-client/client
#   NuGet — Kyvo.AspNetCore, Kyvo.Client
#
# Triggers:
#   - Push of a version tag matching v* (e.g. v1.0.0)
#   - Manual run (workflow_dispatch) with a semver version input
#
# Required repository secrets:
#   NUGET_API_KEY — nuget.org API key (push scope)
#   NPM_TOKEN     — npm granular access token: Publish on @kyvo-client, "Bypass 2FA" enabled
#                   (required when npm account/org has 2FA — classic tokens fail with E403 in CI)

name: SDK publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version to publish (e.g. 2.0.0)"
        required: true
        default: "2.0.0"

jobs:
  publish-sdks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?(\+[A-Za-z0-9.]+)?$ ]]; then
            echo "Invalid semver: $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing SDK version: $VERSION"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Restore and test .NET SDK
        run: |
          dotnet restore sdk/dotnet/Kyvo.sln
          dotnet test sdk/dotnet/Kyvo.sln -c Release --no-restore

      - name: Install npm dependencies and test TypeScript SDK
        working-directory: sdk/typescript
        run: |
          npm ci
          npm test

      - name: Pack NuGet packages
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OUT="${{ runner.temp }}/nupkgs"
          mkdir -p "$OUT"
          dotnet pack sdk/dotnet/Kyvo.AspNetCore/Kyvo.AspNetCore.csproj \
            -c Release -o "$OUT" /p:PackageVersion="$VERSION" --no-restore
          dotnet pack sdk/dotnet/Kyvo.Client/Kyvo.Client.csproj \
            -c Release -o "$OUT" /p:PackageVersion="$VERSION" --no-restore
          ls -la "$OUT"
          echo "NUPKG_DIR=$OUT" >> "$GITHUB_ENV"

      - name: Push packages to NuGet.org
        run: |
          dotnet nuget push "$NUPKG_DIR"/*.nupkg \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Publish @kyvo-client/client to npm
        working-directory: sdk/typescript/@kyvo/client
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$VERSION" != "$PKG_VERSION" ]]; then
            echo "Version mismatch: workflow resolved $VERSION but package.json is $PKG_VERSION."
            echo "Tag v$PKG_VERSION (or bump package.json) before publishing."
            exit 1
          fi

          if npm view "@kyvo-client/client@${VERSION}" version 2>/dev/null | grep -qxF "$VERSION"; then
            echo "npm: @kyvo-client/client@${VERSION} already published — skipping (same as NuGet --skip-duplicate)."
            exit 0
          fi

          npm version "$VERSION" --no-git-tag-version --allow-same-version

          for attempt in 1 2 3; do
            if npm publish --access public; then
              echo "npm publish succeeded on attempt $attempt"
              exit 0
            fi
            if [[ $attempt -lt 3 ]]; then
              echo "npm publish failed (attempt $attempt); retrying in 60s (npm 409 can be transient)..."
              sleep 60
            fi
          done
          echo "npm publish failed after 3 attempts"
          exit 1
