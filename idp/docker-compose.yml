services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kyvo
      POSTGRES_PASSWORD: kyvo
      POSTGRES_DB: kyvo_idp
    ports:
      - "5433:5432"
    volumes:
      - kyvo_idp_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyvo -d kyvo_idp"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5101:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=kyvo_idp;Username=kyvo;Password=kyvo
      Oidc__Issuer: http://localhost:5101
      Google__ClientId: ${GOOGLE_CLIENT_ID:-}
      Google__ClientSecret: ${GOOGLE_CLIENT_SECRET:-}
      DevSeed__Enabled: "true"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  kyvo_idp_pg:
