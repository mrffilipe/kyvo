# Monolith: TLS termination, SPA, API reverse proxy to local Kestrel.

upstream api_backend {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location /v1.0/ {
        proxy_pass http://api_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /connect/ {
        proxy_pass http://api_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /account/ {
        proxy_pass http://api_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # Blazor account pages (wwwroot/css/account.css, etc.) — must not fall through to SPA static files.
    location ^~ /css/ {
        proxy_pass http://api_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /.well-known/ {
        proxy_pass http://api_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # Swagger UI static assets (*.css, *.js) must hit Kestrel — not the SPA regex below.
    location ^~ /swagger {
        proxy_pass http://api_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
