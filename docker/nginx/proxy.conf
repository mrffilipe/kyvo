# TLS reverse proxy for Kyvo (use with compose profile "https").
# Mount certs at /etc/nginx/certs/fullchain.pem and privkey.pem

upstream api_backend {
    server api:8080;
}

upstream frontend_backend {
    server frontend:80;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # API routes
    location /v1.0/ {
        proxy_pass http://api_backend;
        include /etc/nginx/proxy_params;
    }

    location /connect/ {
        proxy_pass http://api_backend;
        include /etc/nginx/proxy_params;
    }

    location /account/ {
        proxy_pass http://api_backend;
        include /etc/nginx/proxy_params;
    }

    location /.well-known/ {
        proxy_pass http://api_backend;
        include /etc/nginx/proxy_params;
    }

    location /swagger {
        proxy_pass http://api_backend;
        include /etc/nginx/proxy_params;
    }

    location /swagger/ {
        proxy_pass http://api_backend;
        include /etc/nginx/proxy_params;
    }

    # Admin SPA (default)
    location / {
        proxy_pass http://frontend_backend;
        include /etc/nginx/proxy_params;
    }
}
