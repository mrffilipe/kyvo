services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kyvo
      POSTGRES_PASSWORD: kyvo
      POSTGRES_DB: kyvo_idp
    ports:
      - "5433:5432"
    volumes:
      - kyvo_idp_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyvo -d kyvo_idp"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5101:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=kyvo_idp;Username=kyvo;Password=kyvo
      Database__ConnectionString: Host=postgres;Port=5432;Database=kyvo_idp;Username=kyvo;Password=kyvo
      Jwt__Issuer: http://localhost:5101
      Google__ClientId: ${GOOGLE_CLIENT_ID:-}
      Google__ClientSecret: ${GOOGLE_CLIENT_SECRET:-}
      Bootstrap__AdminEmail: admin@kyvo.local
      Bootstrap__AdminPassword: ChangeMe!123
      Bootstrap__AdminDisplayName: Kyvo Admin
      SecretProtection__KeyDirectoryPath: /app/keys/data-protection
      SecretProtection__ApplicationName: Kyvo
      PasswordPolicy__MinLength: "8"
      PasswordPolicy__RequireDigit: "true"
      PasswordPolicy__RequireLetter: "true"
      RateLimit__AccountRegisterPermitLimit: "5"
      RateLimit__AccountRegisterWindowMinutes: "15"
      Invite__ExpirationHours: "72"
      Email__FromAddress: noreply@example.com
      Email__Region: us-east-1
      Redis__InstanceName: "kyvo:"
      Redis__TenantIdentifierCacheMinutes: "5"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  kyvo_idp_pg:
