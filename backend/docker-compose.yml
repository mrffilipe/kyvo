# Kyvo API — local container (PostgreSQL/Redis run separately on the host or elsewhere).
#
#   cp .env.example .env
#   openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out keys/oidc-signing.pem
#   docker compose up -d
#
# Compose reads variable substitution from `.env` in this directory.

services:
  kyvo.api:
    image: ${DOCKER_REGISTRY-}kyvoapi
    build:
      context: .
      dockerfile: Kyvo.API/Dockerfile
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${API_PORT:-5000}:8080"
    volumes:
      - ${JWT_SIGNING_KEY_HOST_PATH:-./keys/oidc-signing.pem}:/app/keys/oidc-signing.pem:ro
      - dataprotection:/app/keys/data-protection

volumes:
  dataprotection:
