# Kyvo API — local container (PostgreSQL/Redis run separately on the host or elsewhere).
#
#   cp .env.example .env
#   Generate backend/keys/oidc-signing.pem BEFORE the first compose up (see GETTING_STARTED §3.2).
#   docker compose up -d
#
# Compose reads variable substitution from `.env` in this directory.

services:
  kyvo.api:
    image: ${DOCKER_REGISTRY-}kyvoapi
    build:
      context: .
      dockerfile: Kyvo.API/Dockerfile
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${API_PORT:-5000}:8080"
    volumes:
      # Bind the keys directory (generate keys/oidc-signing.pem before the first up).
      # Not :ro — the named data-protection volume mounts under /app/keys/data-protection.
      - ./keys:/app/keys
      - dataprotection:/app/keys/data-protection

volumes:
  dataprotection:
